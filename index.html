<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>今日の大吉</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;

        background-image: url("./images/torii.jpg?v=1");
        background-repeat: no-repeat;
        background-size: cover;

        --shift-x: 35px;
        --shift-y: 0px;

        background-position: calc(50% + var(--shift-x))
          calc(40% + var(--shift-y));

        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: serif;
        overflow: hidden;

        transform-origin: 50% 50%;

        -webkit-user-select: none;
        user-select: none;
      }

      .box {
        text-align: center;
        text-shadow:
          0 0 12px rgba(255, 255, 255, 0.35),
          0 0 24px rgba(0, 0, 0, 0.85);
      }

      .lead {
        font-size: 20px;
        margin-bottom: 24px;
        letter-spacing: 0.15em;
        transform: translateX(8px);
      }

      .message {
        font-size: 18px;
        color: #f5f7ff;
        line-height: 2.1;
        letter-spacing: 0.15em;
        opacity: 0.9;
      }

      @media (max-width: 768px) {
        body {
          --shift-x: 40px;
          --shift-y: 0px;

          background-position: calc(50% + var(--shift-x))
            calc(55% + var(--shift-y));
        }

        .box {
          transform: translateY(-70px);
        }

        .lead,
        .message {
          transform: translateX(16px);
        }

        #resultMsg {
          font-size: 22px;
          line-height: 2.05;
        }

        #resultCard .shareRow {
          margin-top: 28px;
        }
      }

      .draw-wrap {
        position: fixed;
        left: 0;
        right: 0;
        bottom: calc(150px + env(safe-area-inset-bottom, 0px));
        display: flex;
        justify-content: center;
        pointer-events: none;
        z-index: 20;
      }

      #drawBtn {
        pointer-events: auto;
        width: min(92vw, 520px);
        height: 56px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(0, 0, 0, 0.35);
        color: rgba(255, 255, 255, 0.92);
        font-family: serif;
        font-size: 16px;
        letter-spacing: 0.18em;
        cursor: pointer;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        transition:
          transform 0.12s ease,
          opacity 0.12s ease;
      }

      #drawBtn:active {
        transform: translateY(1px) scale(0.995);
      }

      #drawBtn[disabled] {
        opacity: 0.55;
        cursor: default;
      }

      #resultOverlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms ease;
        z-index: 30;
      }

      #resultOverlay.show {
        opacity: 1;
        pointer-events: auto;
      }

      #resultCard {
        width: min(92vw, 520px);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.55);
        padding: 18px 18px 16px;
        text-align: center;
        color: rgba(255, 255, 255, 0.95);
        letter-spacing: 0.12em;
      }

      #resultTitle {
        font-size: 36px;
        margin: 2px 0 10px;

        color: rgba(255, 255, 255, 0.98);
        text-shadow:
          0 0 6px rgba(255, 255, 255, 0.55),
          0 0 18px rgba(120, 160, 255, 0.22),
          0 0 34px rgba(255, 255, 255, 0.14);
      }

      #resultMsg {
        font-size: 16px;
        line-height: 1.9;
        opacity: 0.92;
        margin: 0;
        white-space: pre-wrap;
        margin: 0 0 28px;

        color: rgba(255, 255, 255, 0.93);
        text-shadow:
          0 0 5px rgba(255, 255, 255, 0.33),
          0 0 14px rgba(120, 160, 255, 0.14);
      }

      body.distort {
        filter: url(#distort) blur(0.35px) contrast(1.05) saturate(1.1);
        animation: wobble 1600ms ease-in-out 1;
      }

      @keyframes wobble {
        0% {
          transform: scale(1) skewX(0deg) skewY(0deg);
        }
        20% {
          transform: scale(1.01) skewX(0.8deg) skewY(-0.6deg);
        }
        45% {
          transform: scale(0.995) skewX(-1.2deg) skewY(0.9deg);
        }
        70% {
          transform: scale(1.008) skewX(0.6deg) skewY(-0.4deg);
        }
        100% {
          transform: scale(1) skewX(0deg) skewY(0deg);
        }
      }

      #noise {
        position: fixed;
        inset: -20%;
        background: repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0) 2px,
          rgba(255, 255, 255, 0.03) 3px,
          rgba(255, 255, 255, 0) 5px
        );
        opacity: 0;
        mix-blend-mode: screen;
        pointer-events: none;
        z-index: 25;
        transform: translateZ(0);
      }

      body.distort #noise {
        opacity: 0.85;
        animation: noiseMove 1600ms linear 1;
      }

      @keyframes noiseMove {
        0% {
          transform: translate3d(0, 0, 0);
        }
        100% {
          transform: translate3d(-12px, 18px, 0);
        }
      }

      #osaisenOverlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms ease;
        z-index: 40;
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
        overflow-y: auto;
        padding: 24px 12px;
        box-sizing: border-box;
      }

      #osaisenOverlay.show {
        opacity: 1;
        pointer-events: auto;
      }

      #osaisenCard {
        width: min(92vw, 520px);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(0, 0, 0, 0.78);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.6);
        padding: 18px 18px 16px;
        text-align: center;
        color: rgba(255, 255, 255, 0.95);
        letter-spacing: 0.12em;
        max-height: calc(100vh - 48px);
        overflow-y: auto;
        box-sizing: border-box;
      }

      #osaisenTitle {
        font-size: 20px;
        margin: 2px 0 14px;
      }

      #osaisenMsg {
        font-size: 14px;
        line-height: 1.75;
        opacity: 0.92;
        margin: 0 0 30px;
        letter-spacing: 0.1em;
      }

      #osaisenTitle {
        margin-bottom: 16px;
      }

      .kyou-word {
        color: #4d59ff;
        text-shadow:
          0 0 8px rgba(77, 89, 255, 0.35),
          0 0 18px rgba(77, 89, 255, 0.22);
      }

      #osaisenMsg {
        line-height: 1.55;
      }

      #osaisenMsg br.gap {
        display: block;
        content: "";
        margin-top: 14px;
      }

      .osaisen-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        width: min(92vw, 360px);
        height: 48px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.14);
        color: rgba(255, 255, 255, 0.92);
        font-family: serif;
        font-size: 14px;
        letter-spacing: 0.12em;
        cursor: pointer;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      .btn:active {
        transform: translateY(1px) scale(0.995);
      }

      .btn.primary {
        background: rgba(255, 255, 255, 0.14);
      }

      .note {
        margin-top: 10px;
        margin-bottom: 22px;
        font-size: 12px;
        opacity: 0.7;
        letter-spacing: 0.08em;
        line-height: 1.6;
      }

      .shareRow {
        margin-top: 0px;
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        align-items: center;
      }

      .shareBtn {
        height: 40px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.92);
        font-family: serif;
        font-size: 13px;
        letter-spacing: 0.12em;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      .shareBtn:active {
        transform: translateY(1px) scale(0.995);
      }

      .shareMsg {
        width: 100%;
        margin-top: 6px;
        font-size: 12px;
        opacity: 0.8;
        letter-spacing: 0.08em;
        line-height: 1.4;
        text-align: center;
      }

      .shareHint {
        width: 100%;
        margin-top: 4px;
        font-size: 11px;
        opacity: 0.65;
        letter-spacing: 0.06em;
        line-height: 1.4;
        text-align: center;
      }

      #paypalArea {
        margin-top: 14px;
        display: none;
      }

      #paypalArea.show {
        display: block;
      }

      #paypalButtons {
        margin-top: 12px;
        min-height: 46px;
      }

      #paypalStatus {
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.6;
        opacity: 0.82;
        letter-spacing: 0.08em;
      }

      #paypalStatus.error {
        color: #ffd3d3;
        opacity: 0.95;
      }

      @media (max-width: 768px) {
        #resultMsg {
          font-size: 22px !important;
          line-height: 2.2 !important;
          margin-bottom: 46px !important;
        }

        #osaisenOverlay {
          padding: 12px 10px;
        }

        #osaisenCard {
          width: min(94vw, 520px);
          max-height: calc(100vh - 24px);
          padding: 16px 14px 14px;
        }

        #resultCard .shareRow {
          margin-top: 28px !important;
        }
      }
    </style>
  </head>

  <body>
    <svg
      width="0"
      height="0"
      style="position: absolute; left: -9999px; top: -9999px"
      aria-hidden="true"
      focusable="false"
    >
      <filter id="distort">
        <feTurbulence
          id="turbulence"
          type="fractalNoise"
          baseFrequency="0.012"
          numOctaves="2"
          seed="2"
        />
        <feDisplacementMap in="SourceGraphic" scale="18" />
      </filter>
    </svg>

    <div id="noise"></div>

    <div class="box">
      <div class="lead">汝、</div>
      <div class="message">
        今日ここに来たこと自体が<br />
        すでに運の巡りなり
      </div>
    </div>

    <div class="draw-wrap">
      <button id="drawBtn" type="button">おみくじを引く</button>
    </div>

    <div id="resultOverlay" aria-live="polite" aria-atomic="true">
      <div id="resultCard">
        <div id="resultTitle">大吉</div>
        <p id="resultMsg">今日はもう勝っている。</p>

        <div class="shareRow">
          <button id="daiShareImg" class="shareBtn" type="button">
            画像で共有
          </button>
          <button id="daiSaveImg" class="shareBtn" type="button">
            画像を保存
          </button>
          <a id="daiPostX" class="shareBtn" target="_blank" rel="noopener"
            >Xへポスト</a
          >
          <button id="daiCopyUrl" class="shareBtn" type="button">
            URLをコピー
          </button>

          <div class="shareHint">
            お神籤は１日１度しかひけません。<br />
            ※PCは共有先が出ない場合があります。その時は「画像を保存」→投稿が確実。
          </div>

          <div id="daiShareMsg" class="shareMsg" aria-live="polite"></div>
        </div>
      </div>
    </div>

    <div id="osaisenOverlay" aria-live="polite" aria-atomic="true">
      <div id="osaisenCard">
        <div id="osaisenTitle">
          あなたは<span class="kyou-word">凶運</span>の持ち主です。
        </div>
        <p id="osaisenMsg">
          この端末は 1/365 の確立の「凶」を引いた。<br class="gap" />
          その凶運は、強運の入口。封印を解くなら、賽銭をひとつ。
        </p>

        <div class="osaisen-actions">
          <button id="osaisenGo" class="btn primary" type="button">
            賽銭する
          </button>
        </div>

        <div id="paypalArea" aria-live="polite">
          <div id="paypalButtons"></div>
          <div id="paypalStatus"></div>
        </div>

        <div class="note">
          ※賽銭しても、今日の判定は凶のままです。<br />
          明日になれば、またお神籤がひけます
        </div>

        <div class="shareRow">
          <button id="kyouShareImg" class="shareBtn" type="button">
            画像で共有
          </button>
          <button id="kyouSaveImg" class="shareBtn" type="button">
            画像を保存
          </button>
          <a id="kyouPostX" class="shareBtn" target="_blank" rel="noopener"
            >Xへポスト</a
          >
          <button id="kyouCopyUrl" class="shareBtn" type="button">
            URLをコピー
          </button>
          <div class="shareHint">
            ※PCは共有先が出ない場合があります。その時は「画像を保存」→投稿が確実。
          </div>
          <div id="shareMsg" class="shareMsg" aria-live="polite"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="./texts.js"></script>

    <script>
      // =========================
      // PayPal設定
      // =========================
      const PAYPAL_CLIENT_ID =
        "ASOzo8Ol7R8omQLgiD1IcyAQl_dHXPG4EeU9FQv53AYm6FHA6WEyyulpAo8Z8jZCHuxRTaOmy-LIdn-Z";
      const OSAISEN_AMOUNT = "100";
      const OSAISEN_CURRENCY = "JPY";

      // =========================
      // GAS Paid Registry
      // =========================
      const GAS_ENDPOINT =
        "https://script.google.com/macros/s/AKfycby_HJGh7-hLEhGdIiC1MgL-gbATPZaPrjgbM0sRo7sID0bz_Fg7XEpuzGWol1TwpBmBZw/exec";
      const GAS_TOKEN = "tane2026_paid_token";

      // =========================
      // 凶の確率
      // =========================
      const PROB_KYOU_DENOM = 365;
      const PROB_KYOU_NUM = 1;

      // localStorage keys
      const KEY_DEVICE_ID = "daikichi_device_id";
      const KEY_OSAISEN_DONE_DATE = "daikichi_osaisen_done_date";
      const KEY_DRAWN_DATE = "daikichi_drawn_date";
      const KEY_PAID_SIGNAL = "daikichi_paid_signal";

      const body = document.body;
      const btn = document.getElementById("drawBtn");
      const overlay = document.getElementById("resultOverlay");
      const titleEl = document.getElementById("resultTitle");
      const msgEl = document.getElementById("resultMsg");
      const turb = document.getElementById("turbulence");

      const osaisenOverlay = document.getElementById("osaisenOverlay");
      const osaisenGo = document.getElementById("osaisenGo");
      const paypalArea = document.getElementById("paypalArea");
      const paypalButtons = document.getElementById("paypalButtons");
      const paypalStatus = document.getElementById("paypalStatus");

      let paypalSdkLoadingPromise = null;
      let paypalButtonsRendered = false;

      function sleep(ms) {
        return new Promise((r) => setTimeout(r, ms));
      }

      function setPaypalStatus(text, isError = false) {
        paypalStatus.textContent = text || "";
        paypalStatus.classList.toggle("error", !!isError);
      }

      function getUnlockKey() {
        let key = localStorage.getItem("unlock_key");
        if (key) return key;

        key =
          globalThis.crypto && crypto.randomUUID
            ? crypto.randomUUID()
            : "u_" +
              Math.random().toString(16).slice(2) +
              Date.now().toString(16);

        localStorage.setItem("unlock_key", key);
        return key;
      }

      function todayKeyJST() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      }

      function recordPaidToGas_(unlockKey, date) {
        try {
          const img = new Image();
          img.src =
            GAS_ENDPOINT +
            "?action=paid" +
            "&token=" +
            encodeURIComponent(GAS_TOKEN) +
            "&unlockKey=" +
            encodeURIComponent(unlockKey) +
            "&date=" +
            encodeURIComponent(date) +
            "&ua=" +
            encodeURIComponent(navigator.userAgent || "") +
            "&t=" +
            Date.now();
        } catch (e) {
          console.error("GAS record failed", e);
        }
      }

      function markPaidSuccess() {
        const today = todayKeyJST();
        const unlockKey = getUnlockKey();

        localStorage.setItem(KEY_OSAISEN_DONE_DATE, today);
        localStorage.setItem(KEY_PAID_SIGNAL, String(Date.now()));
        recordPaidToGas_(unlockKey, today);

        hideOsaisen();
        refreshButtonLabel();
      }

      async function loadPayPalSdk() {
        if (window.paypal) return window.paypal;

        if (paypalSdkLoadingPromise) return paypalSdkLoadingPromise;

        paypalSdkLoadingPromise = new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src =
            "https://www.paypal.com/sdk/js?client-id=" +
            encodeURIComponent(PAYPAL_CLIENT_ID) +
            "&currency=" +
            encodeURIComponent(OSAISEN_CURRENCY);
          s.async = true;
          s.onload = () => {
            if (window.paypal) {
              resolve(window.paypal);
            } else {
              reject(new Error("PayPal SDK の読み込みに失敗しました"));
            }
          };
          s.onerror = () =>
            reject(new Error("PayPal SDK の読み込みに失敗しました"));
          document.head.appendChild(s);
        });

        return paypalSdkLoadingPromise;
      }

      async function postJson(url, bodyObj) {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(bodyObj),
        });

        let json = {};
        try {
          json = await res.json();
        } catch (e) {
          throw new Error("サーバー応答の解析に失敗しました");
        }

        if (!res.ok || !json.ok) {
          throw new Error(json.error || "決済処理に失敗しました");
        }

        return json;
      }

      async function ensurePaypalButtons() {
        if (paypalButtonsRendered) return;

        setPaypalStatus("PayPalを読み込み中...");
        const paypal = await loadPayPalSdk();
        const unlockKey = getUnlockKey();

        paypal
          .Buttons({
            style: {
              shape: "pill",
              layout: "vertical",
              label: "pay",
              height: 45,
            },

            createOrder: async () => {
              setPaypalStatus("注文を作成中...");
              const json = await postJson(
                "/.netlify/functions/create-paypal-order",
                {
                  amount: OSAISEN_AMOUNT,
                  currency: OSAISEN_CURRENCY,
                  unlockKey,
                },
              );

              setPaypalStatus("");
              return json.orderID;
            },

            onApprove: async (data) => {
              setPaypalStatus("支払いを確定中...");
              const json = await postJson(
                "/.netlify/functions/capture-paypal-order",
                {
                  orderID: data.orderID,
                  unlockKey,
                },
              );

              console.log("PayPal capture success", json);
              setPaypalStatus("賽銭ありがとうございました");
              markPaidSuccess();
            },

            onCancel: () => {
              setPaypalStatus("支払いはキャンセルされました");
            },

            onError: (err) => {
              console.error(err);
              setPaypalStatus(
                "PayPalの処理でエラーが出ました。少し時間を置いて再度お試しください。",
                true,
              );
            },
          })
          .render("#paypalButtons");

        paypalButtonsRendered = true;
        setPaypalStatus("");
      }

      async function goToOsaisen() {
        try {
          osaisenGo.disabled = true;
          osaisenGo.textContent = "PayPalを準備中...";
          paypalArea.classList.add("show");
          await ensurePaypalButtons();
          osaisenGo.style.display = "none";
        } catch (e) {
          console.error(e);
          setPaypalStatus(e?.message || "PayPalの準備に失敗しました", true);
          osaisenGo.disabled = false;
          osaisenGo.textContent = "賽銭する";
        }
      }

      function getDeviceId() {
        let v = localStorage.getItem(KEY_DEVICE_ID);
        if (!v) {
          if (crypto && crypto.getRandomValues) {
            const u8 = crypto.getRandomValues(new Uint8Array(16));
            v = Array.from(u8)
              .map((b) => b.toString(16).padStart(2, "0"))
              .join("");
          } else {
            v = String(Math.random()).slice(2) + String(Date.now());
          }
          localStorage.setItem(KEY_DEVICE_ID, v);
        }
        return v;
      }

      function hash32(str) {
        let h = 2166136261;
        for (let i = 0; i < str.length; i++) {
          h ^= str.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return h >>> 0;
      }

      function randInt(maxExclusive) {
        if (crypto && crypto.getRandomValues) {
          const u = crypto.getRandomValues(new Uint32Array(1))[0];
          return u % maxExclusive;
        }
        return Math.floor(Math.random() * maxExclusive);
      }

      function pickOmikujiTodayFixed() {
        const texts = window.OMICHIJI_TEXTS || { daikichi: [], kyou: [] };

        const params = new URLSearchParams(location.search);
        const DEBUG_KEY = "tane2026";
        const debugOk = params.get("debug") === DEBUG_KEY;

        if (debugOk && params.get("force") === "kyou") {
          const kyouMsg =
            texts.kyou && texts.kyou.length ? texts.kyou[0] : "凶";
          return { title: "凶", msg: kyouMsg, isKyou: true };
        }
        if (debugOk && params.get("force") === "daikichi") {
          const arr =
            texts.daikichi && texts.daikichi.length
              ? texts.daikichi
              : [
                  "今日ここに来たこと自体が、もう当たり。\n小さく動けば、運は勝手に追いつく。",
                ];
          const idx = 0;
          return { title: "大吉", msg: arr[idx], isKyou: false };
        }

        const deviceId = getDeviceId();
        const today = todayKeyJST();
        const baseKey = `${deviceId}:${today}`;

        const r = hash32(baseKey) % PROB_KYOU_DENOM;
        const isKyou = r < PROB_KYOU_NUM;

        if (isKyou) {
          const kyouMsg =
            texts.kyou && texts.kyou.length ? texts.kyou[0] : "凶";
          return { title: "凶", msg: kyouMsg, isKyou: true };
        }

        const arr =
          texts.daikichi && texts.daikichi.length
            ? texts.daikichi
            : [
                "今日ここに来たこと自体が、もう当たり。\n小さく動けば、運は勝手に追いつく。",
              ];

        const idx = hash32(baseKey + ":msg") % arr.length;
        return { title: "大吉", msg: arr[idx], isKyou: false };
      }

      function isLockedToday() {
        const today = todayKeyJST();
        const done = localStorage.getItem(KEY_OSAISEN_DONE_DATE);
        const drawn = localStorage.getItem(KEY_DRAWN_DATE);

        if (drawn !== today) return false;

        const result = pickOmikujiTodayFixed();
        return result.isKyou && done !== today;
      }

      function showOsaisen() {
        osaisenOverlay.classList.add("show");
      }

      function hideOsaisen() {
        osaisenOverlay.classList.remove("show");
      }

      // 旧 paid=1 戻り方式の保険
      function handlePaidParam() {
        const u = new URL(location.href);
        const paid = (u.searchParams.get("paid") || "").trim();

        if (paid === "1") {
          const today = todayKeyJST();
          const unlockKey = getUnlockKey();

          localStorage.setItem(KEY_OSAISEN_DONE_DATE, today);
          localStorage.setItem(KEY_PAID_SIGNAL, String(Date.now()));
          recordPaidToGas_(unlockKey, today);

          u.searchParams.delete("paid");
          history.replaceState(null, "", u.toString());

          setTimeout(() => {
            try {
              window.close();
            } catch (e) {}
          }, 800);
        }
      }

      window.addEventListener("storage", (e) => {
        if (e.key === KEY_PAID_SIGNAL) {
          const today = todayKeyJST();
          localStorage.setItem(KEY_OSAISEN_DONE_DATE, today);
          hideOsaisen();
          refreshButtonLabel();
        }
      });

      function handleResetParam() {
        const u = new URL(location.href);
        const reset = (u.searchParams.get("reset") || "").trim();

        if (reset === "1") {
          localStorage.removeItem(KEY_DEVICE_ID);
          localStorage.removeItem(KEY_OSAISEN_DONE_DATE);
          localStorage.removeItem(KEY_DRAWN_DATE);
          localStorage.removeItem("unlock_key");

          u.searchParams.delete("reset");
          history.replaceState(null, "", u.toString());
          location.reload();
        }
      }

      function refreshButtonLabel() {
        if (isLockedToday()) {
          btn.textContent = "賽銭しないと引けない";
        } else {
          btn.textContent = "おみくじを引く";
        }
      }

      async function distortAndReveal() {
        if (isLockedToday()) {
          showOsaisen();
          return;
        }

        btn.disabled = true;
        overlay.classList.remove("show");
        hideOsaisen();

        turb.setAttribute("seed", String(randInt(9999) + 1));
        body.classList.add("distort");

        const start = performance.now();
        const dur = 1600;

        function tick(now) {
          const t = Math.min(1, (now - start) / dur);
          const amp = Math.sin(t * Math.PI);
          const bf = 0.01 + amp * 0.02;
          turb.setAttribute("baseFrequency", bf.toFixed(4));
          if (t < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);

        await sleep(dur);

        const result = pickOmikujiTodayFixed();

        localStorage.setItem(KEY_DRAWN_DATE, todayKeyJST());

        body.classList.remove("distort");

        if (result.isKyou) {
          showOsaisen();
        } else {
          titleEl.textContent = result.title;
          msgEl.textContent = result.msg;
          overlay.classList.add("show");
        }

        await sleep(300);
        btn.disabled = false;

        refreshButtonLabel();
      }

      btn.addEventListener("click", distortAndReveal);

      overlay.addEventListener("click", () => {
        overlay.classList.remove("show");
      });

      osaisenGo.addEventListener("click", goToOsaisen);

      handlePaidParam();
      handleResetParam();
      refreshButtonLabel();

      // =========================
      // 凶：共有
      // =========================
      const kyouShareImg = document.getElementById("kyouShareImg");
      const kyouSaveImg = document.getElementById("kyouSaveImg");
      const kyouPostX = document.getElementById("kyouPostX");
      const kyouCopyUrl = document.getElementById("kyouCopyUrl");
      const shareMsg = document.getElementById("shareMsg");

      function toastShare(t) {
        shareMsg.textContent = t;
        clearTimeout(window.__shareToastTimer);
        window.__shareToastTimer = setTimeout(
          () => (shareMsg.textContent = ""),
          2400,
        );
      }

      function buildKyouShareText() {
        const title =
          document.getElementById("osaisenTitle")?.innerText?.trim() || "凶";
        const msg =
          document.getElementById("osaisenMsg")?.innerText?.trim() || "";
        return `${title}\n\n${msg}\n\n#今日の大吉\n${location.href}`;
      }

      function refreshKyouShareLinks() {
        const text = buildKyouShareText();
        kyouPostX.href =
          "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text);
      }

      async function renderKyouCardPack() {
        if (typeof html2canvas !== "function") {
          throw new Error("html2canvas未読込（CDN/読み込み順/ネット）");
        }

        const el = document.getElementById("osaisenCard");
        if (document.fonts?.ready) await document.fonts.ready;

        const canvas = await html2canvas(el, {
          scale: 2,
          backgroundColor: "#07080c",
          useCORS: true,
          onclone: (doc) => {
            const c = doc.getElementById("osaisenCard");
            if (c) {
              c.style.background = "rgba(0,0,0,0.65)";
              c.style.backdropFilter = "none";
              c.style.webkitBackdropFilter = "none";
            }
          },
        });

        const blob = await new Promise((resolve) =>
          canvas.toBlob(resolve, "image/png", 1),
        );

        return { blob, canvas };
      }

      kyouCopyUrl.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(location.href);
          toastShare("URLをコピーしました");
        } catch (e) {
          console.error(e);
          toastShare("コピーできませんでした");
        }
      });

      kyouSaveImg.addEventListener("click", async () => {
        try {
          const { blob, canvas } = await renderKyouCardPack();

          if (!blob) {
            const dataUrl = canvas.toDataURL("image/png");
            const a = document.createElement("a");
            a.href = dataUrl;
            a.download = "omikuji_kyou.png";
            a.click();
            toastShare(
              "画像を保存しました。X/インスタで画像を選んで投稿してね",
            );
            return;
          }

          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "omikuji_kyou.png";
          a.click();
          URL.revokeObjectURL(url);

          toastShare("画像を保存しました。X/インスタで画像を選んで投稿してね");
        } catch (e) {
          console.error(e);
          toastShare("保存に失敗：" + (e?.message || e));
        }
      });

      kyouShareImg.addEventListener("click", async () => {
        try {
          const { blob } = await renderKyouCardPack();

          if (!blob) {
            toastShare("この端末は画像共有に未対応。『画像を保存』が確実！");
            return;
          }

          const file = new File([blob], "omikuji_kyou.png", {
            type: "image/png",
          });

          if (navigator.canShare?.({ files: [file] }) && navigator.share) {
            await navigator.share({
              title: "今日の大吉",
              text: "#今日の大吉",
              files: [file],
            });
            toastShare("共有メニューからX/Instagramを選んでね");
          } else {
            toastShare("この端末は画像共有に未対応。『画像を保存』が確実！");
          }
        } catch (e) {
          console.error(e);
          toastShare("共有に失敗：" + (e?.message || e));
        }
      });

      // =========================
      // 大吉：共有
      // =========================
      const daiShareImg = document.getElementById("daiShareImg");
      const daiSaveImg = document.getElementById("daiSaveImg");
      const daiPostX = document.getElementById("daiPostX");
      const daiCopyUrl = document.getElementById("daiCopyUrl");
      const daiShareMsg = document.getElementById("daiShareMsg");

      function toastDai(t) {
        daiShareMsg.textContent = t;
        clearTimeout(window.__daiToastTimer);
        window.__daiToastTimer = setTimeout(
          () => (daiShareMsg.textContent = ""),
          2400,
        );
      }

      function buildDaiShareText() {
        const title =
          document.getElementById("resultTitle")?.innerText?.trim() || "大吉";
        const msg =
          document.getElementById("resultMsg")?.innerText?.trim() || "";
        return `${title}\n\n${msg}\n\n#今日の大吉\n${location.href}`;
      }

      function refreshDaiShareLinks() {
        const text = buildDaiShareText();
        daiPostX.href =
          "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text);
      }

          throw new Error("html2canvas未読込（CDN/読み込み順/ネット）");
        }

        const el = document.getElementById("resultCard");
        if (document.fonts?.ready) await document.fonts.ready;

        const canvas = await html2canvas(el, {
          scale: 2,
          backgroundColor: "#07080c",
          useCORS: true,
          onclone: (doc) => {
            const c = doc.getElementById("resultCard");
            if (c) {
              c.style.background = "rgba(0,0,0,0.55)";
              c.style.backdropFilter = "none";
              c.style.webkitBackdropFilter = "none";
            }
          },
        });

        const blob = await new Promise((resolve) =>
          canvas.toBlob(resolve, "image/png", 1),
        );

        return { blob, canvas };
      }

      daiCopyUrl.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(location.href);
          toastDai("URLをコピーしました");
        } catch (e) {
          console.error(e);
          toastDai("コピーできませんでした");
        }
      });

      daiSaveImg.addEventListener("click", async () => {
        try {
          const { blob, canvas } = await renderDaiCardPack();

          if (!blob) {
            const dataUrl = canvas.toDataURL("image/png");
            const a = document.createElement("a");
            a.href = dataUrl;
            a.download = "omikuji_daikichi.png";
            a.click();
            toastDai("画像を保存しました。X/インスタで画像を選んで投稿してね");
            return;
          }

          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "omikuji_daikichi.png";
          a.click();
          URL.revokeObjectURL(url);

          toastDai("画像を保存しました。X/インスタで画像を選んで投稿してね");
        } catch (e) {
          console.error(e);
          toastDai("保存に失敗：" + (e?.message || e));
        }
      });

      daiShareImg.addEventListener("click", async () => {
        try {
          const { blob } = await renderDaiCardPack();

          if (!blob) {
            toastDai("この端末は画像共有に未対応。『画像を保存』が確実！");
            return;
          }

          const file = new File([blob], "omikuji_daikichi.png", {
            type: "image/png",
          });

          if (navigator.canShare?.({ files: [file] }) && navigator.share) {
            await navigator.share({
              title: "今日の大吉",
              text: "#今日の大吉",
              files: [file],
            });
            toastDai("共有メニューからX/Instagramを選んでね");
          } else {
            toastDai("この端末は画像共有に未対応。『画像を保存』が確実！");
          }
        } catch (e) {
          console.error(e);
          toastDai("共有に失敗：" + (e?.message || e));
        }
      });

      refreshDaiShareLinks();
      refreshKyouShareLinks();
    </script>
  </body>
